---
version: v1alpha
name: "dealers-360-dummy"
layer: user
type: lens
tags:
  - Tier.Gold
description: "Dealers Intelligence semantic model (DUMMY DATA) provides comprehensive dealer analytics for VIP tier tracking, order analysis, product mix insights, and regional performance. Uses generated dummy data in icebase.dealers_360."
lens:
  compute: runnable-default
  secrets:
    - name: sales3601
      allKeys: true
  source:
    type: minerva
    name: minervac
    catalog: icebase 
  repo:                               
    url: https://bitbucket.org/rubik_/solutions-mobility
    lensBaseDir: solutions-mobility/dealers-360-2/dealers_360_dummy/model
    syncFlags:
      - --ref=demo
  api:
    replicas: 2
    logLevel: info
    envs:
      LENS2_SCHEDULED_REFRESH_TIMEZONES: "UTC,America/Vancouver,America/Toronto"
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  worker:
    replicas: 1
    logLevel: info
    envs:
      LENS2_SCHEDULED_REFRESH_TIMEZONES: "UTC,America/Vancouver,America/Toronto"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 400m
        memory: 512Mi
  router:
    logLevel: info
    envs:
      LENS2_SCHEDULED_REFRESH_TIMEZONES: "UTC,America/Vancouver,America/Toronto"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 400m
        memory: 512Mi

  metric:
    logLevel: info
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

